<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Soechi VMS — Staff Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; color: #1e293b; background: #f0f4f8; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes drawerIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn { from { opacity: 0; transform: scale(.96) translateY(8px);} to { opacity:1; transform: scale(1) translateY(0);} }
  .sc-nav:hover { background: rgba(255,255,255,.07) !important; }
  .sc-row:hover { background: #f8fafc !important; }
  .sc-press:active { transform: translateY(1px); }
  .sc-card-h:hover { box-shadow: 0 8px 24px -10px rgba(0,45,90,.18) !important; }
</style>
</head>
<body>
<div id="app"></div>

<script type="text/html" id="dc-template">
<sc-if value="{{ isLogin }}" hint-placeholder-val="{{ true }}">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;background:#001a36;background-image:radial-gradient(circle at 15% 15%, rgba(0,113,227,.3), transparent 40%), radial-gradient(circle at 85% 85%, rgba(0,113,227,.15), transparent 40%);">
    <div style="width:420px;max-width:92vw;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:30px;justify-content:center;">
        <div style="width:46px;height:46px;border-radius:12px;background:#0071e3;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px -6px rgba(0,113,227,.6);"><i class="ph-fill ph-anchor" style="font-size:25px;color:#fff;"></i></div>
        <div><div style="font-size:19px;font-weight:800;color:#fff;letter-spacing:-.02em;">Soechi VMS</div><div style="font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#7fb5ee;">Staff Console</div></div>
      </div>
      <div style="background:#fff;border-radius:20px;padding:36px;box-shadow:0 30px 60px -20px rgba(0,0,0,.5);">
        <div style="font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#94a3b8;margin-bottom:8px;">Internal sign in</div>
        <h2 style="font-size:23px;font-weight:800;color:#0f172a;letter-spacing:-.02em;margin:0 0 4px;">Welcome back</h2>
        <p style="font-size:13px;color:#64748b;margin:0 0 26px;">Sign in with your Soechi staff account.</p>
        <label style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#94a3b8;display:block;margin-bottom:8px;">Username</label>
        <div style="position:relative;margin-bottom:16px;">
          <i class="ph ph-user" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:18px;"></i>
          <input value="sari" style="width:100%;border:1px solid #e2e8f0;border-radius:12px;padding:13px 14px 13px 42px;font-size:14px;font-weight:600;color:#334155;outline:none;font-family:inherit;" />
        </div>
        <label style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#94a3b8;display:block;margin-bottom:8px;">Password</label>
        <div style="position:relative;margin-bottom:22px;">
          <i class="ph ph-lock-simple" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:18px;"></i>
          <input type="password" value="staffpass" style="width:100%;border:1px solid #e2e8f0;border-radius:12px;padding:13px 14px 13px 42px;font-size:14px;font-weight:600;color:#334155;outline:none;font-family:inherit;" />
        </div>
        <button class="sc-press" onClick="{{ login }}" style="width:100%;background:#0071e3;color:#fff;font-weight:700;font-size:15px;border:none;border-radius:12px;padding:14px;cursor:pointer;box-shadow:0 10px 24px -8px rgba(0,113,227,.55);display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;">Sign in <i class="ph-bold ph-arrow-right"></i></button>
        <button class="sc-press" style="width:100%;margin-top:10px;background:#fff;border:1px solid #cbd5e1;color:#334155;font-weight:700;font-size:14px;border-radius:12px;padding:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;"><i class="ph ph-shield-check" style="color:#0071e3;"></i> Continue with SSO</button>
        <div style="margin-top:22px;padding-top:18px;border-top:1px solid #f1f5f9;font-size:11px;color:#94a3b8;text-align:center;line-height:1.6;">Access is role-based. Your queues and permissions are determined by your assigned role.</div>
      </div>
    </div>
  </div>
</sc-if>

<sc-if value="{{ isApp }}" hint-placeholder-val="{{ false }}">
  <div style="min-height:100vh;display:flex;font-family:'Inter',sans-serif;background:#f0f4f8;">
    <aside style="width:248px;background:#001a36;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;">
      <div style="padding:20px 18px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.08);">
        <div style="width:36px;height:36px;border-radius:10px;background:#0071e3;display:flex;align-items:center;justify-content:center;"><i class="ph-fill ph-anchor" style="font-size:19px;color:#fff;"></i></div>
        <div><div style="font-size:14px;font-weight:800;color:#fff;letter-spacing:-.01em;">Soechi VMS</div><div style="font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#7fb5ee;">Staff Console</div></div>
      </div>
      <div style="padding:16px 14px 6px;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#4f7aa6;">Operations</div>
      <nav style="padding:0 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;">
        <sc-if value="{{ act.dashboard }}" hint-placeholder-val="{{ true }}"><div onClick="{{ goNav.dashboard }}" style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:700;background:#0071e3;color:#fff;cursor:pointer;"><i class="ph ph-gauge" style="font-size:18px;"></i><span style="flex:1;">Dashboard</span></div></sc-if>
        <sc-if value="{{ inact.dashboard }}" hint-placeholder-val="{{ false }}"><div class="sc-nav" onClick="{{ goNav.dashboard }}" style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:500;background:transparent;color:#aac4e0;cursor:pointer;transition:background .15s;"><i class="ph ph-gauge" style="font-size:18px;"></i><span style="flex:1;">Dashboard</span></div></sc-if>

        <sc-if value="{{ act.invoices }}" hint-placeholder-val="{{ false }}"><div onClick="{{ goNav.invoices }}" style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:700;background:#0071e3;color:#fff;cursor:pointer;"><i class="ph ph-receipt" style="font-size:18px;"></i><span style="flex:1;">Invoice Processing</span><span style="display:inline-flex;align-items:center;padding:1px 8px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(255,255,255,.25);color:#fff;">6</span></div></sc-if>
        <sc-if value="{{ inact.invoices }}" hint-placeholder-val="{{ true }}"><div class="sc-nav" onClick="{{ goNav.invoices }}" style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:500;background:transparent;color:#aac4e0;cursor:pointer;transition:background .15s;"><i class="ph ph-receipt" style="font-size:18px;"></i><span style="flex:1;">Invoice Processing</span><span style="display:inline-flex;align-items:center;padding:1px 8px;border-radius:20px;font-size:10px;font-weight:700;background:#0071e3;color:#fff;">6</span></div></sc-if>

        <sc-if value="{{ act.documents }}" hint-placeholder-val="{{ false }}"><div onClick="{{ goNav.documents }}" style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:700;background:#0071e3;color:#fff;cursor:pointer;"><i class="ph ph-shield-check" style="font-size:18px;"></i><span style="flex:1;">Document Verification</span><span style="display:inline-flex;align-items:center;padding:1px 8px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(255,255,255,.25);color:#fff;">3</span></div></sc-if>
        <sc-if value="{{ inact.documents }}" hint-placeholder-val="{{ true }}"><div class="sc-nav" onClick="{{ goNav.documents }}" style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:500;background:transparent;color:#aac4e0;cursor:pointer;transition:background .15s;"><i class="ph ph-shield-check" style="font-size:18px;"></i><span style="flex:1;">Document Verification</span><span style="display:inline-flex;align-items:center;padding:1px 8px;border-radius:20px;font-size:10px;font-weight:700;background:#0071e3;color:#fff;">3</span></div></sc-if>

        <sc-if value="{{ act.vendors }}" hint-placeholder-val="{{ false }}"><div onClick="{{ goNav.vendors }}" style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:700;background:#0071e3;color:#fff;cursor:pointer;"><i class="ph ph-buildings" style="font-size:18px;"></i><span style="flex:1;">Vendors</span></div></sc-if>
        <sc-if value="{{ inact.vendors }}" hint-placeholder-val="{{ true }}"><div class="sc-nav" onClick="{{ goNav.vendors }}" style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:500;background:transparent;color:#aac4e0;cursor:pointer;transition:background .15s;"><i class="ph ph-buildings" style="font-size:18px;"></i><span style="flex:1;">Vendors</span></div></sc-if>

        <sc-if value="{{ act.po }}" hint-placeholder-val="{{ false }}"><div onClick="{{ goNav.po }}" style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:700;background:#0071e3;color:#fff;cursor:pointer;"><i class="ph ph-file-text" style="font-size:18px;"></i><span style="flex:1;">POs &amp; Contracts</span></div></sc-if>
        <sc-if value="{{ inact.po }}" hint-placeholder-val="{{ true }}"><div class="sc-nav" onClick="{{ goNav.po }}" style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:500;background:transparent;color:#aac4e0;cursor:pointer;transition:background .15s;"><i class="ph ph-file-text" style="font-size:18px;"></i><span style="flex:1;">POs &amp; Contracts</span></div></sc-if>

        <sc-if value="{{ act.comms }}" hint-placeholder-val="{{ false }}"><div onClick="{{ goNav.comms }}" style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:700;background:#0071e3;color:#fff;cursor:pointer;"><i class="ph ph-megaphone" style="font-size:18px;"></i><span style="flex:1;">Communications</span></div></sc-if>
        <sc-if value="{{ inact.comms }}" hint-placeholder-val="{{ true }}"><div class="sc-nav" onClick="{{ goNav.comms }}" style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:500;background:transparent;color:#aac4e0;cursor:pointer;transition:background .15s;"><i class="ph ph-megaphone" style="font-size:18px;"></i><span style="flex:1;">Communications</span></div></sc-if>


        <sc-if value="{{ act.admin }}" hint-placeholder-val="{{ false }}"><div onClick="{{ toggleAdmin }}" style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:700;background:#0071e3;color:#fff;cursor:pointer;"><i class="ph ph-gear-six" style="font-size:18px;"></i><span style="flex:1;">Administration</span><i class="{{ adminCaret }}" style="font-size:14px;"></i></div></sc-if>
        <sc-if value="{{ inact.admin }}" hint-placeholder-val="{{ true }}"><div class="sc-nav" onClick="{{ goNav.admin }}" style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:500;background:transparent;color:#aac4e0;cursor:pointer;transition:background .15s;"><i class="ph ph-gear-six" style="font-size:18px;"></i><span style="flex:1;">Administration</span><i class="ph ph-caret-right" style="font-size:14px;"></i></div></sc-if>
        <sc-if value="{{ adminExpanded }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex;flex-direction:column;gap:2px;margin:2px 0 4px;">
            <sc-for list="{{ adminSubTabs }}" as="tb" hint-placeholder-count="6"><div class="sc-nav" onClick="{{ tb.onClick }}" style="{{ tb.navStyle }}"><i class="{{ tb.icon }}" style="font-size:15px;"></i><span>{{ tb.label }}</span></div></sc-for>
          </div>
        </sc-if>

        <sc-if value="{{ act.reports }}" hint-placeholder-val="{{ false }}"><div onClick="{{ goNav.reports }}" style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:700;background:#0071e3;color:#fff;cursor:pointer;"><i class="ph ph-chart-bar" style="font-size:18px;"></i><span style="flex:1;">Reports</span></div></sc-if>
        <sc-if value="{{ inact.reports }}" hint-placeholder-val="{{ true }}"><div class="sc-nav" onClick="{{ goNav.reports }}" style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:500;background:transparent;color:#aac4e0;cursor:pointer;transition:background .15s;"><i class="ph ph-chart-bar" style="font-size:18px;"></i><span style="flex:1;">Reports</span></div></sc-if>
      </nav>
      <div style="margin-top:auto;padding:14px;border-top:1px solid rgba(255,255,255,.08);">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:38px;height:38px;border-radius:50%;background:#0071e3;color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;">SW</div>
          <div style="min-width:0;"><div style="font-size:13px;font-weight:700;color:#fff;">Sari Wijaya</div><div style="font-size:11px;color:#7fb5ee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">AP / Tax-Finance Verifier</div></div>
        </div>
      </div>
    </aside>
    <div style="flex:1;min-width:0;display:flex;flex-direction:column;">
      <header style="height:64px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:30;flex-shrink:0;">
        <div style="width:340px;max-width:40vw;"></div>
        <div style="display:flex;align-items:center;gap:14px;">
          <div style="font-size:13px;color:#64748b;font-weight:600;display:flex;align-items:center;gap:7px;"><i class="ph ph-clock" style="color:#94a3b8;"></i>{{ clock }}</div>
          <div style="position:relative;">
          <button onClick="{{ toggleNotif }}" style="position:relative;width:38px;height:38px;border-radius:10px;border:1px solid #e2e8f0;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#475569;"><i class="ph ph-bell" style="font-size:18px;"></i><span style="position:absolute;top:-4px;right:-4px;min-width:17px;height:17px;border-radius:9px;background:#ef4444;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px;">5</span></button>
          <sc-if value="{{ notifOpen }}" hint-placeholder-val="{{ false }}">
            <div onClick="{{ closeNotif }}" style="position:fixed;inset:0;z-index:60;"></div>
            <div style="position:absolute;top:46px;right:0;z-index:61;width:340px;background:#fff;border:1px solid #e2e8f0;border-radius:14px;box-shadow:0 18px 44px -16px rgba(0,0,0,.4);overflow:hidden;">
              <div style="padding:13px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;"><span style="font-size:13px;font-weight:800;color:#0f172a;">Notifications</span><span style="font-size:11px;font-weight:700;color:#0071e3;background:#eff6ff;padding:3px 9px;border-radius:20px;">5 new</span></div>
              <div style="max-height:340px;overflow-y:auto;">
                <sc-for list="{{ notifList }}" as="n" hint-placeholder-count="5">
                  <div class="sc-row" style="display:flex;gap:11px;padding:12px 16px;border-bottom:1px solid #f5f7fa;cursor:pointer;">
                    <div style="width:32px;height:32px;border-radius:8px;background:{{ n.bg }};color:{{ n.color }};display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="{{ n.icon }}" style="font-size:16px;"></i></div>
                    <div style="flex:1;min-width:0;"><div style="font-size:12.5px;font-weight:600;color:#334155;line-height:1.4;">{{ n.text }}</div><div style="font-size:11px;color:#94a3b8;margin-top:2px;">{{ n.time }}</div></div>
                  </div>
                </sc-for>
              </div>
              <div style="padding:10px 16px;text-align:center;border-top:1px solid #f1f5f9;"><span style="font-size:12px;font-weight:700;color:#0071e3;cursor:pointer;">View all</span></div>
            </div>
          </sc-if>
          </div>
          <button onClick="{{ toggleStaffRole }}" title="Switch role (demo)" class="sc-press" style="font-size:11px;font-weight:700;color:#0071e3;background:#eff6ff;border:1px solid #bfdbfe;padding:6px 12px;border-radius:20px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;"><i class="ph-bold ph-user-switch"></i> {{ staffRoleLabel }}</button>
        </div>
      </header>
      <main style="flex:1;min-width:0;overflow-y:auto;">
        <div style="max-width:1240px;margin:0 auto;padding:28px;">

          <sc-if value="{{ isDashboard }}" hint-placeholder-val="{{ true }}">
            <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;">
              <div>
                <h1 style="font-size:24px;font-weight:800;color:#0f172a;letter-spacing:-.02em;margin:0 0 4px;">Operations Dashboard</h1>
                <p style="font-size:14px;color:#64748b;margin:0;">Invoice pipeline, SLA health and payables across all vendors.</p>
              </div>
              <button class="sc-press" onClick="{{ navReports }}" style="background:#fff;border:1px solid #cbd5e1;color:#334155;font-weight:700;font-size:13px;border-radius:11px;padding:11px 18px;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:inherit;"><i class="ph ph-file-xls" style="color:#16a34a;"></i> Export report</button>
            </div>

            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;">
              <sc-for list="{{ stats }}" as="s" hint-placeholder-count="4">
                <div class="sc-card-h" onClick="{{ s.onClick }}" style="{{ s.cardStyle }}">
                  <div style="display:flex;align-items:center;gap:9px;margin-bottom:14px;">
                    <div style="{{ s.iconStyle }}"><i class="{{ s.icon }}" style="font-size:18px;"></i></div>
                    <span style="{{ s.labelStyle }}">{{ s.label }}</span>
                  </div>
                  <div style="{{ s.valueStyle }}">{{ s.value }}</div>
                  <div style="font-size:12px;color:#64748b;font-weight:500;margin-top:4px;">{{ s.sub }}</div>
                </div>
              </sc-for>
            </div>

            <div style="background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:22px;box-shadow:0 1px 2px rgba(0,0,0,.04);margin-bottom:20px;">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
                <div style="display:flex;align-items:center;gap:9px;"><i class="ph-bold ph-flow-arrow" style="color:#0071e3;font-size:18px;"></i><span style="font-size:14px;font-weight:800;color:#0f172a;">Invoice pipeline — P2P cycle</span></div>
                <span style="font-size:12px;color:#64748b;">44 invoices in flight</span>
              </div>
              <div style="display:flex;align-items:stretch;gap:10px;">
                <sc-for list="{{ pipeline }}" as="p" hint-placeholder-count="5">
                  <div class="sc-card-h" onClick="{{ p.onClick }}" style="flex:1;background:{{ p.bg }};border:1px solid {{ p.bd }};border-radius:14px;padding:16px;cursor:pointer;transition:box-shadow .2s;position:relative;">
                    <div style="font-size:32px;font-weight:900;color:{{ p.color }};letter-spacing:-.02em;line-height:1;">{{ p.count }}</div>
                    <div style="font-size:12px;font-weight:700;color:#475569;margin-top:8px;">{{ p.label }}</div>
                    <sc-if value="{{ p.alert }}" hint-placeholder-val="{{ false }}"><div style="font-size:11px;font-weight:700;color:#dc2626;margin-top:6px;display:flex;align-items:center;gap:4px;"><i class="ph-fill ph-warning-circle"></i>{{ p.alert }}</div></sc-if>
                  </div>
                </sc-for>
              </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
              <div style="background:#fff;border:1px solid #e2e8f0;border-radius:18px;box-shadow:0 1px 2px rgba(0,0,0,.04);overflow:hidden;">
                <div style="padding:18px 22px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;">
                  <div style="display:flex;align-items:center;gap:9px;"><i class="ph-fill ph-warning-octagon" style="color:#dc2626;font-size:18px;"></i><span style="font-size:14px;font-weight:800;color:#0f172a;">SLA breaches</span></div>
                  <span style="font-size:11px;font-weight:700;color:#dc2626;background:#fef2f2;padding:4px 10px;border-radius:20px;">2 active</span>
                </div>
                <sc-for list="{{ breaches }}" as="b" hint-placeholder-count="2">
                  <div class="sc-row" onClick="{{ b.onClick }}" style="display:flex;align-items:center;gap:13px;padding:15px 22px;border-bottom:1px solid #f5f7fa;cursor:pointer;">

<script>

  componentDidMount() {
    this.tick(); this._t = setInterval(() => this.tick(), 1000);
    this._fileInput = document.createElement('input');
    this._fileInput.type = 'file';
    this._fileInput.accept = '.pdf,.jpg,.jpeg,.png,.doc,.docx';
    this._fileInput.style.display = 'none';
    document.body.appendChild(this._fileInput);
    this._browseHandler = (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const t = (btn.textContent || '').trim().toLowerCase();
      if (['browse','pilih berkas','upload','re-upload','upload document','upload new document','unggah'].includes(t)) {
        this._fileInput.value = '';
        this._fileInput.click();
      }
    };
    document.addEventListener('click', this._browseHandler, true);
  }
  componentWillUnmount() { clearInterval(this._t); if (this._browseHandler) document.removeEventListener('click', this._browseHandler, true); }
  tick() {
    const d = new Date();
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const p = n => String(n).padStart(2,'0');
    this.setState({ clock: `${days[d.getDay()]}, ${d.getDate()} ${mon[d.getMonth()]} · ${p(d.getHours())}:${p(d.getMinutes())}` });
  }

    const navIds = ['dashboard','invoices','documents','vendors','po','comms','masterdata','admin','reports'];
    const goNav = {}, act = {}, inact = {};
    navIds.forEach(id => { goNav[id] = () => { if(id==='admin'){ this.setState({ adminExpanded:true }); } this.go(id); }; act[id] = s.module===id; inact[id] = s.module!==id; });

    const stats = [
      { label:'My Queue', value:'3', sub:'invoices assigned to you', icon:'ph-fill ph-tray', c:'#4f46e5', bg:'#eef2ff', bd:'#c7d2fe', ibg:'#e0e7ff', onClick:()=>this.go('invoices') },

    // vendors (held in state so register + HOD approval mutate them)
    const originMeta = (o) => o==='foreign' ? ['#f5f3ff','#7c3aed','Foreign'] : ['#eff6ff','#1d4ed8','Local'];
    const reqForOrigin = (o) => this.state.docMaster
      .filter(d => d.enabled!==false && (d.appliesTo===o || d.appliesTo==='both'))
      .map(d => ({ name:d.name, mandatory:d.mandatory,
      badgeStyle: (d.mandatory ? 'background:#fef2f2;color:#b91c1c;' : 'background:#f1f5f9;color:#64748b;') + 'font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:20px;white-space:nowrap;',
      badgeLabel: d.mandatory ? 'Mandatory' : 'Optional' }));
    const vq = (s.vendorSearch || '').trim().toLowerCase();
    const vendors = this.state.vendors.filter(v => {
      if (!vq) return true;
      const m = this.vendorStatusMeta(v.status);
      const hay = [v.name, v.cat, v.taxId, v.origin==='foreign'?'foreign overseas':'local indonesia', (m&&m.label)||'', v.source, (v.detail&&v.detail.country)||'', (v.detail&&v.detail.city)||''].join(' ').toLowerCase();

        isPendingHod: pendingHod, notPendingHod: !pendingHod,

    });
    const pendingHodCount = this.state.vendors.filter(v=>v.status==='pending-hod').length;
    const hasPendingHod = pendingHodCount > 0;

    // document master (state-held; Add document appends)
    const appliesMeta = (a) => a==='foreign' ? ['#f5f3ff','#7c3aed','Foreign'] : a==='local' ? ['#eff6ff','#1d4ed8','Local'] : ['#f1f5f9','#475569','Both'];
    const docMaster = this.state.docMaster.map((d, i) => {
      const am = appliesMeta(d.appliesTo);
      const enabled = d.enabled !== false;
      return { ...d,
        appliesStyle:this.pill(am[0],am[1])+'font-size:10px;', appliesLabel:am[2],
        typeStyle:this.pill('#f8fafc','#475569')+'font-size:10px;border:1px solid #e2e8f0;',
        reqStyle:(d.mandatory ? this.pill('#eef2ff','#4338ca') : this.pill('#f1f5f9','#64748b'))+'font-size:10px;',
        reqLabel: d.mandatory ? 'Mandatory' : 'Optional',
        enabled, rowStyle: enabled ? '' : 'opacity:.5;',
        validityLabel: (d.validity==='0'||d.validity===0||!d.validity) ? 'No validity required' : (d.validity + ' days'),

        toggleLabel: enabled ? 'Disable' : 'Enable',

        reminderStyle: 'display:inline-flex;align-items:center;gap:4px;cursor:pointer;font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;'+((d.reminder&&d.reminder!=='Off')?'background:#fffbeb;color:#b45309;border:1px solid #fde68a;':'background:#f1f5f9;color:#94a3b8;border:1px solid #e2e8f0;'),
        onReminderToggle: () => { const cyc=['Off','2 weeks','1 month']; const cur=this.state.docMaster[i].reminder||'Off'; const nx=cyc[(cyc.indexOf(cur)+1)%cyc.length]; const next=this.state.docMaster.map((x,j)=> j===i ? {...x, reminder:nx} : x); this.setState({ docMaster: next }); },
        onEdit: () => this.setState({ docModal:true, docEditNo:d.no, docForm:{ name:d.name, type:d.type, appliesTo:d.appliesTo, validity:d.validity, req: d.mandatory?'Mandatory':'Optional', reminder:d.reminder||'Off' } }),
      };
    });

    let hodView = null;

    // vendor details modal (tabbed)
    let vendorView = null;
    if (s.vendorView) {
      const v = s.vendorView; const om = originMeta(v.origin); const m = this.vendorStatusMeta(v.status);

      const uploadedFlags = docNames.map((n,i) => v.status==='draft' ? (i < 2) : (v.status==='pending-hod' ? (i < docNames.length-1) : true));
      const docs = docNames.map((n,i) => {
        const uploaded = uploadedFlags[i];
        const vkey = v.name + '||' + n;
        // inactive vendors start unverified; others verified (unless pending-hod which is awaiting)

        return { name:n, uploaded, notUploaded: !uploaded, verified, canVerify: uploaded && !verified,
          statusLabel, badgeStyle: this.pill(c[0],c[1])+'font-size:10px;',

          toggleIcon: !uploaded ? 'ph-bold ph-minus-circle' : (verified ? 'ph-fill ph-check-circle' : 'ph-bold ph-seal-check'),

          onPreview: uploaded ? (()=>this.setState({ docPreview:{ vendor:v.name, name:n, file:(v.short||'DOC')+'-'+String(i+1).padStart(2,'0')+'.pdf' } })) : (()=>{}),
          onToggleVerify: uploaded ? (()=>{ this.setState({ docVerify: { ...this.state.docVerify, [vkey]: !verified } }); }) : (()=>{}),
        };
      });
      const tabBtn = (id,label,icon) => ({ label, icon, onClick:()=>this.setState({ vendorTab:id }),

      // ---- vendorView continuation (audit, detail fields, tabs, banks, violations, footer) ----

        { icon:'ph-fill ph-files', color:'#7c3aed', who:(v.source==='office'?(v.by||'Sari Wijaya'):(v.pic||'Andi Pratama')), action:'Uploaded compliance documents for verification', time:'02 Jul 2026 · 14:26', browser:'Chrome 126 · Windows', location:(v.origin==='foreign'?'Overseas':'Jakarta, ID') },
        { icon:(m ? 'ph-fill ph-seal-check' : 'ph-fill ph-clock'), color:'#16a34a', who:'Dewi Anggraini', action:('Status set to '+((m&&m.label)||'Draft')), time:'03 Jul 2026 · 10:05', browser:'Edge 126 · Windows', location:'Jakarta, ID' },
      ];

        ? [ ['Business entity', dd.entity], ['Category', v.cat], ['Tax ID / NPWP', v.taxId], ['Country', dd.country||'Indonesia'],

            ['PIC email', dd.picEmail], ['Soechi reference', dd.reference] ]
        : [ ['Category', v.cat], ['Tax ID', v.taxId], ['Origin', om[2]], ['Country', (v.origin==='foreign'?(v.country||'Overseas'):'Indonesia')],

      const needsApproval = (v.status==='pending-hod' || v.status==='pending');

        avatarBg: (v.status==='inactive'||v.status==='blacklisted') ? '#94a3b8' : (v.origin==='foreign' ? '#5b21b6' : '#002d5a'),

      // hod modal
      hodView, closeHod: () => this.setState({ hodVendor:null }),
      approveHod: () => { const hv=this.state.hodVendor; if(!hv) return; const next=this.state.vendors.map(z => (z.name===hv.name?{...z,status:'active'}:z)); this.setState({ vendors:next, hodVendor:null }); },
      rejectHod: () => this.setState({ hodVendor:null }),

      // reg bank modal
      regBankModalOpen, closeRegBankModal: () => this.setState({ regBankModal:false }),
      setRegBankLocal: () => this.setState({ regBankModalOrigin:'local' }), setRegBankForeign: () => this.setState({ regBankModalOrigin:'foreign' }),
      regBankLocalStyle: regBankModalLocalStyle, regBankForeignStyle: regBankModalForeignStyle, regBankModalForeign, regBankModalCurs,
      setRegBankMSame: () => this.setState({ regBankMSame:true }), setRegBankMDiff: () => this.setState({ regBankMSame:false }),
      regBankMSameStyle, regBankMDiffStyle, regBankMDiff,
      saveRegBank: () => { const arr=(this.state.regExtraBanks||[]).slice(); arr.push({ name:'Additional bank', detail:(rbmSel.join(' / ')+' · new account') }); this.setState({ regBankModal:false, regExtraBanks:arr }); },

      // doc master modal
      docModalOpen, openDocModal: () => this.setState({ docModal:true, docEditNo:null, docForm:{ req:'Optional', appliesTo:'both', type:'Legal', reminder:'Off', validity:'0' } }),
      closeDocModal: () => this.setState({ docModal:false }),
      docModalTitle, docFormName, docFormValidity, docTypeOpts, docAppliesOpts, docReqOpts, docReminderOpts,
      onDocName: (e) => setDocForm({ name:e.target.value }), onDocType: (e) => setDocForm({ type:e.target.value }),
      onDocApplies: (e) => setDocForm({ appliesTo:e.target.value }), onDocValidity: (e) => setDocForm({ validity:e.target.value }),
      onDocReq: (e) => setDocForm({ req:e.target.value }), onDocReminder: (e) => setDocForm({ reminder:e.target.value }),
      saveDoc: () => {
        const f = this.state.docForm||{}; const editNo = this.state.docEditNo;
        const rec = { name:f.name||'Untitled document', type:f.type||'Legal', appliesTo:f.appliesTo||'both', validity:f.validity||'0', mandatory:(f.req==='Mandatory'), reminder:f.reminder||'Off' };
        let dmArr = this.state.docMaster.slice();
        if (editNo) { dmArr = dmArr.map(d => d.no===editNo ? { ...d, ...rec } : d); }
        else { rec.no = 'DOC-'+String(dmArr.length).padStart(3,'0'); rec.enabled = true; dmArr.unshift(rec); }
        this.setState({ docMaster: dmArr, docModal:false, docForm:{}, docEditNo:null });
      },

      // export modal
      exportModalOpen, exportVendor, closeExport: () => this.setState({ exportModal:null }), doExport: () => this.setState({ exportModal:null }),

      // vb delete modal
      vbDelModalOpen, closeVbDelete: () => this.setState({ vbDelModal:null, vbDelRemark:'' }),
      vbDelBankName, vbDelRemark, onVbDelRemark: (e) => this.setState({ vbDelRemark: e.target.value }),
      vbDelEnabled, vbDelDisabled: !vbDelEnabled, confirmVbDelete: () => this.vbConfirmDelete(),

      // doc preview modal
      docPreviewOpen, docPreviewName, docPreviewFile, closeDocPreview: () => this.setState({ docPreview:null }),

      // violation modal
      violationModalOpen, violationVendor, closeViolation: () => this.setState({ violationModal:null }),
      submitViolation: () => { const vm=this.state.violationModal; if(!vm) return; const el=document.getElementById('vio_remarks'); const remarks=(el&&el.value)||'Reported violation'; const next=this.state.violations.slice(); next.unshift({ vendor:vm.vendor, remarks, file:'violation-report.pdf', status:'pending', by:'', on:'', reporter:'Sari Wijaya' }); this.setState({ violations:next, violationModal:null }); },

      // rbac copy modal
      rbacCopyOpen, closeRbacCopy: () => this.setState({ rbacCopyModal:false }),
      rbacCopyFromValue: rbacCopyFrom, onRbacCopyFrom: (e) => this.setState({ rbacCopyFrom: e.target.value }),
      rbacCopyToValue: rbacCopyTo, onRbacCopyTo: (e) => this.setState({ rbacCopyTo: Array.from(e.target.selectedOptions).map(o=>o.value) }),
      rbacCopyTargets, rbacCopyCount: rbacCopyTo.length,
      doRbacCopy: () => { const from=this.state.rbacCopyFrom||rbacRoleNames[0]; const tos=this.state.rbacCopyTo||[]; const rb=JSON.parse(JSON.stringify(this.state.rbac)); tos.forEach(t => { rb[t] = JSON.parse(JSON.stringify(rb[from]||this.rbacDefault())); }); this.setState({ rbac:rb, rbacCopyModal:false }); },

      // admin add/edit modal
      adminModalOpen, adminModalTitle, adminFields, adminIsUserEdit,
      adminResetDone: !!s.adminResetDone, adminResetNotDone: !s.adminResetDone,
      resetPassword: () => this.setState({ adminResetDone:true }),
      closeAdmin: () => this.setState({ adminModal:null, adminForm:{}, adminResetDone:false }),
      saveAdmin: () => this.adminSave(),

      // drawer
      drawerInv, closeDrawer: () => this.setState({ drawerId:null }),

      // login + misc
      login: () => this.setState({ screen:'app' }),
      stop: (e) => { if (e && e.stopPropagation) e.stopPropagation(); },
    };
  }
}


// ---- bootstrap ----
document.addEventListener('DOMContentLoaded', function () {
  var tplStr = document.getElementById('dc-template').textContent;
  var tpl = window.__dcParse(tplStr);
  var app = new Component();
  app.mount('#app', tpl);
});
</script>
</body>
</html>
