name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install
        run: bun install --frozen-lockfile
      - name: Lint + format check (biome)
        run: bun run check
      - name: Typecheck
        run: bun run typecheck
      - name: Build
        run: bun run build
